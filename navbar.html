<!DOCTYPE html>
<html>
<head>
<title>Doctor Website</title>

<style>

/* --- Navbar Floating Container --- */
.navbar-wrapper {
    position: fixed;
    top: 20px;
    left: 0;
    width: 100%;
    z-index: 1000;
    display: flex;
    justify-content: center;
    font-family: 'Open Sans', sans-serif;
}

.navbar-container {
    width: 93%;
    max-width: 1100px;
    background:  rgba(16, 128, 162, 0.9) ;
    opacity: 0.9;
    backdrop-filter: blur(10px); /* Glassmorphism Blur Effect */
    -webkit-backdrop-filter: blur(10px);
    padding: 12px 30px;
    border-radius: 50px; /* Fully Rounded Floating Bar */
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

/* --- Brand Logo --- */
.nav-logo a {
    font-family: 'Montserrat', sans-serif;
    color: #ffffff;
    font-weight: 800;
    font-size: 20px;
    text-decoration: none;
    text-transform: uppercase;
}

.nav-logo span {
    color: #ececec; /* Medical Sky Blue */
}

/* --- Menu Links --- */
.nav-menu {
    display: flex;
    list-style: none;
    gap: 30px;
    margin: 0;
    padding: 0;
}

.nav-menu li a {
    color: black;
    font-size: 19px;
    font-weight: 600;
    text-decoration: none;
    padding: 8px 0;
    border-bottom: 2px solid transparent;
    transition: 0.3s ease;
}

.nav-menu li a:hover {
    color: #0399d9;
}
.nav-menu li a.active {
    color: #000;
    border-bottom: 2px solid #dea925;
}

/* --- Dropdown Styling (Pure CSS) --- */
.dropdown {
    position: relative;
}

.arrow {
    font-size: 10px;
    margin-left: 4px;
}

.dropdown-content {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    background: #1a2b3c;
    min-width: 180px;
    border-radius: 8px;
    padding: 10px 0;
    margin-top: 15px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}

.dropdown-content li a {
    padding: 10px 20px;
    display: block;
    border: none !important;
}

.dropdown:hover .dropdown-content {
    display: block;
}

/* --- Visual Toggle Button (Right Side) --- */
.nav-toggle {
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

.toggle-circle {
    width: 18px;
    height: 18px;
    background: #5bc0de;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(91, 192, 222, 0.5);
}

/* --- Responsiveness --- */
@media (max-width: 900px) {
    .nav-menu { gap: 15px; }
    .nav-menu li a { font-size: 13px; }
}

@media (max-width: 768px) {
    .navbar-container {
        border-radius: 20px;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
    }
    .nav-toggle { display: none; }
}

</style>

</head>

<body>

<nav class="navbar-wrapper">
    <div class="navbar-container">
        <div class="nav-logo">
            <a href="#">Dr. Shahila <span>Ameer</span></a>
        </div>

        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li class="dropdown">
                <a href="#">Services <span class="arrow">▾</span></a>
                <ul class="dropdown-content">
                    <li><a href="#">General Checkup</a></li>
                    <li><a href="#">Cardiology</a></li>
                    <li><a href="#">Pediatrics</a></li>
                </ul>
            </li>
            <li><a href="#">Blogs</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">Appointment</a></li>
        </ul>
    </div>
</nav>

</body>
</html>
